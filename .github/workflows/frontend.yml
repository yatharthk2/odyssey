name: Frontend

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint + build (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # .npmrc pins legacy-peer-deps=true but we pass it explicitly so this
        # step never silently regresses if the file is deleted by mistake.
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          # Mirror prod so any build-time use of the WS URL doesn't crash.
          NEXT_PUBLIC_INPERSONA_WS_URL: wss://api.yatharthk.com/chat
        run: npm run build

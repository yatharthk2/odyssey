name: Smoke test (live chat)

on:
  pull_request:
    branches: [main]
  schedule:
    # 06:00 UTC daily -- catches silent production regressions overnight.
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: WebSocket chat smoke
    runs-on: ubuntu-latest
    # Hard cap: the script itself enforces a 90s per-request budget, so 10
    # minutes is comfortable headroom even if all 6 prompts run serially.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install websockets client
        run: pip install 'websockets>=12,<14'

      - name: Run live smoke test against api.yatharthk.com
        run: python .github/scripts/smoke_chat.py

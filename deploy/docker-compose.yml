# Production stack for the Inpersona backend.
#
# Layout:
#   caddy   -> terminates TLS for api.yatharthk.com, reverse-proxies to backend
#              with WebSocket upgrade pass-through. Auto-fetches Let's Encrypt
#              certs on first start (just make sure the A record is live).
#   backend -> FastAPI / Uvicorn. Lives on an internal network, never exposed
#              to the public directly.
#   redis   -> Cache for the LLM responses. Optional but cheap.
#
# Run from the deploy/ directory:
#   docker compose up -d
#   docker compose logs -f backend

# Resource limits are sized for a 2 vCPU / 4 GB Hetzner CX22 so one component's
# spike (an index rebuild, a torch allocation) can't OOM-kill the whole box and
# take caddy or redis down with it. `mem_limit` / `cpus` are honored by
# `docker compose up` (not just swarm).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - inpersona

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: inpersona-backend:latest
    restart: unless-stopped
    mem_limit: 2560m       # embedding model + torch + Chroma, with rebuild headroom
    mem_reservation: 1g
    cpus: 1.5
    healthcheck:
      # /ready 503s until the RAG stack is built. backend-nupur gates on this so
      # the two backends never cold-start their index builds simultaneously and
      # OOM the box.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/ready').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    env_file:
      - .env
    environment:
      # Override the few defaults that differ in production from the local
      # PropertyGraphSettings defaults. Everything else comes from .env or the
      # dataclass defaults.
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      # Persistent storage so the indices survive container restarts.
      - backend_storage:/app/storage
      - backend_chroma:/app/chroma_db
      - backend_hfcache:/app/.cache/huggingface
      # Source documents — read-only mount so you can update resume.txt etc.
      # on the host and `docker compose restart backend` to re-index.
      - ./documents:/app/documents:ro
    depends_on:
      - redis
    networks:
      - inpersona

  # Second persona (Nupur Kalele). Same image as `backend`, no separate build —
  # just its own documents, prompt, indices, and Redis logical DB.
  backend-nupur:
    image: inpersona-backend:latest   # reuse the image `backend` builds — no second build
    restart: unless-stopped
    mem_limit: 1200m                   # lower than backend's 2560m to avoid overcommit on 3.7 GiB
    mem_reservation: 768m
    cpus: 1.0
    env_file:
      - .env                           # reuses the shared Groq/Gemini keys (shared rate limit)
    environment:
      REDIS_URL: redis://redis:6379/1  # separate logical DB -> no cache cross-contamination
      HOST: 0.0.0.0
      PORT: 8000
      PROMPT_PATH: /app/persona.prompt.txt
      # ALLOWED_ORIGINS left unset -> defaults to "*" (no frontend yet; tighten later)
    volumes:
      - backend_nupur_storage:/app/storage
      - backend_nupur_chroma:/app/chroma_db
      - backend_nupur_hfcache:/app/.cache/huggingface
      - ./documents-nupur:/app/documents:ro
      - ./personas/nupur.prompt.txt:/app/persona.prompt.txt:ro
    depends_on:
      backend:
        condition: service_healthy     # start only after Yatharth's backend is warm -> avoids cold-start OOM
      redis:
        condition: service_started
    networks:
      - inpersona

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - inpersona

networks:
  inpersona:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  backend_storage:
  backend_chroma:
  backend_hfcache:
  backend_nupur_storage:
  backend_nupur_chroma:
  backend_nupur_hfcache:
  redis_data:
